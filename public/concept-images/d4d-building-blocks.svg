<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 310" role="img" aria-labelledby="title desc">
  <title id="title">D4D building blocks</title>
  <desc id="desc">The five D4D building blocks: Operational Backbone, Accountability Framework, Shared Customer Insights, External Developer Platform, and Digital Platform.</desc>
  <rect width="1120" height="310" rx="20" fill="#f8fafc"/>
  <rect x="1" y="1" width="1118" height="308" rx="19" fill="none" stroke="#99f6e4"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="34" y="38" fill="#0f172a" font-size="22" font-weight="850">D4D-byggklossene</text>
    <g transform="translate(34 72)">
      <g transform="translate(0 0)">
        <path d="M0 0h62v26h42v62H78V52H0Z" fill="#14b8a6"/>
        <text x="128" y="20" fill="#0f172a" font-size="17" font-weight="850">Operational Backbone</text>
        <text x="128" y="46" fill="#334155" font-size="15">Legger til rette for driftstabilitet,</text>
        <text x="128" y="68" fill="#334155" font-size="15">sikkerhet, skalering og observability.</text>
      </g>
      <line x1="322" y1="-12" x2="322" y2="212" stroke="#cbd5e1"/>
      <g transform="translate(360 0)">
        <path d="M0 0h62v52h42v62H78V78H36V26H0Z" fill="#9333ea"/>
        <text x="128" y="20" fill="#0f172a" font-size="17" font-weight="850">Accountability Framework</text>
        <text x="128" y="46" fill="#334155" font-size="15">Definerer roller og ansvar på tvers for</text>
        <text x="128" y="68" fill="#334155" font-size="15">retningslinjer, samsvar og kommunikasjon.</text>
      </g>
      <line x1="685" y1="-12" x2="685" y2="212" stroke="#cbd5e1"/>
      <g transform="translate(724 0)">
        <path d="M16 0h30v116H16Z" fill="#3b82f6"/>
        <path d="M0 0h62v20H0ZM0 96h62v20H0Z" fill="#60a5fa"/>
        <text x="128" y="20" fill="#0f172a" font-size="17" font-weight="850">Shared Customer Insights</text>
        <text x="128" y="46" fill="#334155" font-size="15">Organiserer innsikt og data på tvers av</text>
        <text x="128" y="68" fill="#334155" font-size="15">domener for å skape verdi og beslutninger.</text>
      </g>
      <line x1="0" y1="116" x2="1052" y2="116" stroke="#cbd5e1"/>
      <g transform="translate(0 146)">
        <path d="M0 0h78v78H0Z" fill="#7dd3fc" opacity=".55"/>
        <text x="128" y="18" fill="#0f172a" font-size="17" font-weight="850">External Developer Platform</text>
        <text x="128" y="44" fill="#334155" font-size="15">Bygger åpne plattformer med API-er og</text>
        <text x="128" y="66" fill="#334155" font-size="15">verktøy som gjør det enkelt for partnere å delta.</text>
      </g>
      <g transform="translate(724 146)">
        <path d="M0 0h62v52h42v62H78V78H36V26H0Z" fill="#7c3aed" opacity=".88"/>
        <text x="128" y="18" fill="#0f172a" font-size="17" font-weight="850">Digital Platform</text>
        <text x="128" y="44" fill="#334155" font-size="15">Kombinerer driftsprosesser, data og</text>
        <text x="128" y="66" fill="#334155" font-size="15">teknologiplattform for rask digital utvikling.</text>
      </g>
    </g>
  </g>
</svg>
