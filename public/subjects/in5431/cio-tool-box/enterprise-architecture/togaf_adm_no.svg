<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1120" role="img" aria-labelledby="title desc">
  <title id="title">TOGAF ADM – norsk modell med distinkte farger</title>
  <desc id="desc">TOGAF ADM-modell med Kravhåndtering i sentrum og fasene rundt, hver sirkel har en distinkt farge.</desc>
  <defs>
    <marker id="arrowHead" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2b2b2b" />
    </marker>
  </defs>
  <style>
    .circle,.center-circle{stroke:#333;stroke-width:3;filter:drop-shadow(0 2px 2px rgba(0,0,0,.20));}
    .preliminary{fill:#FFD166;}   /* gul */
    .a-phase{fill:#4D96FF;}       /* blå */
    .b-phase{fill:#6BCB77;}       /* grønn */
    .c-phase{fill:#B983FF;}       /* lilla */
    .d-phase{fill:#FF9F1C;}       /* oransje */
    .e-phase{fill:#FF6B6B;}       /* rød */
    .f-phase{fill:#2EC4B6;}       /* turkis */
    .g-phase{fill:#A3E635;}       /* limegrønn */
    .h-phase{fill:#FF85C0;}       /* rosa */
    .center-fill{fill:#F7B801;}   /* gyllen */
    .arrow{stroke:#333;stroke-width:4;fill:none;stroke-linecap:round;}
    text{text-anchor:middle;dominant-baseline:middle;font-family:Arial,Helvetica,sans-serif;fill:#151515;}
    .label{font-size:28px;font-weight:500;}
    .label-small{font-size:24px;font-weight:500;}
    .phase{font-weight:700;}
    .center-label{font-size:30px;font-weight:700;}
    .credit{font-size:18px;fill:#666;}
  </style>

  <rect width="900" height="1120" fill="#ffffff"/>

  <!-- Ytre sirkelpiler -->
  <path class="arrow" d="M 522 330 L 598 348" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 748 435 L 766 474" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 760 636 L 714 698" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 607 820 L 532 864" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 368 865 L 288 820" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 185 693 L 156 639" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 156 475 L 185 420" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 292 348 L 378 330" marker-end="url(#arrowHead)" />

  <!-- Piler mot sentrum -->
  <path class="arrow" d="M 450 228 L 450 260" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 450 410 L 450 455" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 555 488 L 612 430" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 570 555 L 690 555" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 552 625 L 617 695" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 450 675 L 450 795" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 348 625 L 283 695" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 330 555 L 210 555" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M 345 488 L 288 430" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)" />

  <!-- Sirkler -->
  <circle class="circle preliminary" cx="450" cy="135" r="92" />
  <circle class="circle a-phase" cx="450" cy="335" r="92" />
  <circle class="circle b-phase" cx="680" cy="380" r="92" />
  <circle class="circle c-phase" cx="780" cy="555" r="92" />
  <circle class="circle d-phase" cx="680" cy="760" r="92" />
  <circle class="circle e-phase" cx="450" cy="890" r="92" />
  <circle class="circle f-phase" cx="220" cy="760" r="92" />
  <circle class="circle g-phase" cx="120" cy="555" r="92" />
  <circle class="circle h-phase" cx="220" cy="380" r="92" />
  <circle class="center-circle center-fill" cx="450" cy="555" r="120" />

  <!-- Tekst -->
  <text class="label phase" x="450" y="135">Innledende</text>

  <text class="label" x="450" y="312">
    <tspan class="phase" x="450" dy="0">A.</tspan>
    <tspan x="450" dy="32">Arkitektur-</tspan>
    <tspan x="450" dy="32">visjon</tspan>
  </text>

  <text class="label" x="680" y="365">
    <tspan class="phase" x="680" dy="0">B.</tspan>
    <tspan x="680" dy="32">Forretnings-</tspan>
    <tspan x="680" dy="32">arkitektur</tspan>
  </text>

  <text class="label-small" x="780" y="528">
    <tspan class="phase" x="780" dy="0">C.</tspan>
    <tspan x="780" dy="30">Informasjons-</tspan>
    <tspan x="780" dy="30">system-</tspan>
    <tspan x="780" dy="30">arkitekturer</tspan>
  </text>

  <text class="label-small" x="680" y="745">
    <tspan class="phase" x="680" dy="0">D.</tspan>
    <tspan x="680" dy="30">Teknologi-</tspan>
    <tspan x="680" dy="30">arkitektur</tspan>
  </text>

  <text class="label-small" x="450" y="862">
    <tspan class="phase" x="450" dy="0">E.</tspan>
    <tspan x="450" dy="30">Muligheter</tspan>
    <tspan x="450" dy="30">og</tspan>
    <tspan x="450" dy="30">løsninger</tspan>
  </text>

  <text class="label-small" x="220" y="745">
    <tspan class="phase" x="220" dy="0">F.</tspan>
    <tspan x="220" dy="30">Migrerings-</tspan>
    <tspan x="220" dy="30">planlegging</tspan>
  </text>

  <text class="label-small" x="120" y="528">
    <tspan class="phase" x="120" dy="0">G.</tspan>
    <tspan x="120" dy="30">Implementerings-</tspan>
    <tspan x="120" dy="30">styring</tspan>
  </text>

  <text class="label-small" x="220" y="350">
    <tspan class="phase" x="220" dy="0">H.</tspan>
    <tspan x="220" dy="30">Arkitektur-</tspan>
    <tspan x="220" dy="30">endrings-</tspan>
    <tspan x="220" dy="30">håndtering</tspan>
  </text>

  <text class="center-label" x="450" y="540">
    <tspan x="450" dy="0">Krav-</tspan>
    <tspan x="450" dy="36">håndtering</tspan>
  </text>

  <text class="credit" x="760" y="1035">© The Open Group</text>
</svg>