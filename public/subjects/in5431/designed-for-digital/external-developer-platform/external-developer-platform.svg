<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 230" role="img" aria-labelledby="title desc">
  <title id="title">External Developer Platform</title>
  <desc id="desc">Digital components are exposed to partners and external developers through APIs, documentation, and boundary resources.</desc>
  <rect width="980" height="230" rx="22" fill="#f8fafc"/>
  <rect x="1" y="1" width="978" height="228" rx="21" fill="none" stroke="#bae6fd"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="42" y="42" fill="#0f172a" font-size="24" font-weight="850">External Developer Platform</text>
    <text x="42" y="72" fill="#475569" font-size="16">Åpner digitale komponenter for partnere gjennom API-er og boundary resources.</text>

    <g transform="translate(70 96)">
      <rect x="0" y="0" width="230" height="112" rx="22" fill="#ecfeff" stroke="#0891b2" stroke-width="4"/>
      <rect x="34" y="34" width="54" height="44" rx="12" fill="#cffafe" stroke="#0891b2" stroke-width="3"/>
      <rect x="104" y="34" width="54" height="44" rx="12" fill="#cffafe" stroke="#0891b2" stroke-width="3"/>
      <rect x="174" y="34" width="22" height="44" rx="11" fill="#cffafe" stroke="#0891b2" stroke-width="3"/>
      <text x="115" y="134" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="800">Internal components</text>
    </g>

    <path d="M322 152h98" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-dasharray="7 8"/>
    <path d="M420 152l-14-10v20Z" fill="#94a3b8"/>

    <g transform="translate(456 104)">
      <rect x="0" y="0" width="160" height="96" rx="20" fill="#f0f9ff" stroke="#0284c7" stroke-width="4"/>
      <text x="80" y="42" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="900">API</text>
      <text x="80" y="68" text-anchor="middle" fill="#475569" font-size="14">docs + tools</text>
      <text x="80" y="124" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="800">Boundary resources</text>
    </g>

    <path d="M642 152h98" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-dasharray="7 8"/>
    <path d="M740 152l-14-10v20Z" fill="#94a3b8"/>

    <g transform="translate(776 96)">
