      <circle cx="120" cy="44" r="30" fill="#ecfeff" stroke="#0891b2" stroke-width="4"/>
      <circle cx="87" cy="88" r="30" fill="#f0f9ff" stroke="#0369a1" stroke-width="4"/>
      <text x="87" y="134" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="800">Partners</text>
    </g>
  </g>
