<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 230" role="img" aria-labelledby="title desc">
  <title id="title">Digital Platform</title>
  <desc id="desc">A digital platform made of reusable business, data, and infrastructure components that can be composed into digital offerings.</desc>
  <rect width="980" height="230" rx="22" fill="#f8fafc"/>
  <rect x="1" y="1" width="978" height="228" rx="21" fill="none" stroke="#c4b5fd"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="42" y="42" fill="#0f172a" font-size="24" font-weight="850">Digital Platform</text>
    <text x="42" y="72" fill="#475569" font-size="16">Gjenbrukbare komponenter som kan settes sammen raskt til digitale tilbud.</text>

    <g transform="translate(54 104)">
      <rect x="0" y="0" width="150" height="74" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="4"/>
      <text x="75" y="32" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="800">Business</text>
      <text x="75" y="55" text-anchor="middle" fill="#475569" font-size="13">capabilities</text>
    </g>

    <g transform="translate(254 104)">
      <rect x="0" y="0" width="150" height="74" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
      <text x="75" y="32" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="800">Data</text>
      <text x="75" y="55" text-anchor="middle" fill="#475569" font-size="13">insights</text>
    </g>

    <g transform="translate(454 104)">
      <rect x="0" y="0" width="150" height="74" rx="18" fill="#ecfeff" stroke="#0891b2" stroke-width="4"/>
      <text x="75" y="32" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="800">Infrastructure</text>
      <text x="75" y="55" text-anchor="middle" fill="#475569" font-size="13">services</text>
    </g>

    <path d="M206 141h38M406 141h38M606 141h70" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-dasharray="7 8"/>
    <path d="M675 141l-14-10v20Z" fill="#94a3b8"/>

    <g transform="translate(704 88)">
      <rect x="0" y="0" width="220" height="110" rx="22" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
      <circle cx="50" cy="46" r="18" fill="#fed7aa" stroke="#f97316" stroke-width="3"/>
      <rect x="84" y="30" width="92" height="20" rx="10" fill="#ffedd5" stroke="#f97316" stroke-width="3"/>
      <rect x="45" y="72" width="132" height="18" rx="9" fill="#ffedd5" stroke="#f97316" stroke-width="3"/>
      <text x="110" y="132" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="800">Digital offering</text>
    </g>
  </g>
</svg>
