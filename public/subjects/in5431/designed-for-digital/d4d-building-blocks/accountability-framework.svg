<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 230" role="img" aria-labelledby="title desc">
  <title id="title">Accountability Framework</title>
  <desc id="desc">A framework that balances autonomy and alignment by clarifying ownership and responsibility for digital offerings and components.</desc>
  <rect width="980" height="230" rx="22" fill="#f8fafc"/>
  <rect x="1" y="1" width="978" height="228" rx="21" fill="none" stroke="#d8b4fe"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="42" y="42" fill="#0f172a" font-size="24" font-weight="850">Accountability Framework</text>
    <text x="42" y="72" fill="#475569" font-size="16">Tydelig eierskap som balanserer autonomi med felles retning.</text>

    <g transform="translate(82 110)">
      <circle cx="44" cy="32" r="24" fill="#f3e8ff" stroke="#9333ea" stroke-width="4"/>
      <path d="M20 92c5-27 43-35 48-35s43 8 48 35" fill="#f3e8ff" stroke="#9333ea" stroke-width="4" stroke-linecap="round"/>
      <text x="44" y="122" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="800">Owner</text>
    </g>

    <g transform="translate(324 100)">
      <rect x="0" y="0" width="332" height="104" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
      <line x1="166" y1="18" x2="166" y2="86" stroke="#cbd5e1" stroke-width="3"/>
      <text x="83" y="44" text-anchor="middle" fill="#0f172a" font-size="17" font-weight="850">Autonomy</text>
      <text x="83" y="70" text-anchor="middle" fill="#475569" font-size="14">hastighet</text>
      <text x="249" y="44" text-anchor="middle" fill="#0f172a" font-size="17" font-weight="850">Alignment</text>
      <text x="249" y="70" text-anchor="middle" fill="#475569" font-size="14">gjenbruk</text>
      <circle cx="166" cy="52" r="15" fill="#f3e8ff" stroke="#9333ea" stroke-width="4"/>
    </g>

    <path d="M218 156h80M682 156h80" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-dasharray="7 8"/>

    <g transform="translate(800 96)">
      <rect x="0" y="0" width="120" height="34" rx="12" fill="#f3e8ff" stroke="#9333ea" stroke-width="3"/>
      <rect x="0" y="48" width="120" height="34" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
      <rect x="0" y="96" width="120" height="34" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="3"/>
      <text x="60" y="-12" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="800">Responsibilities</text>
      <text x="60" y="23" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">Offering</text>
      <text x="60" y="71" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">Component</text>
      <text x="60" y="119" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">Governance</text>
    </g>
  </g>
</svg>
